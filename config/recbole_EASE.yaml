# --------------------
# execution
# --------------------
predict: false
checkpoint: ""
seed: 42
device: cuda
verbose: true
run_name: "recbole_EASE_seqtopn"

wandb: true
wandb_project:
memo: |

# --------------------
# train / problem / data
# --------------------
train:
  run_dir: "saved/runs"
  submit_dir: "saved/submit"
  seed: 42
  epochs: 20
  train_batch_size: 2048
  eval_batch_size: 4096
  learning_rate: 0.001
  topk: 100

problem:
  name: movies_seq_topn

data:
  pipeline: random_masked_ml_v1 # 랜덤 마스킹 스플릿을 캐시로 고정(모델 간 동일 분리 보장)

dataset:
  data_path: "data/movielens/train"
  cache_dir: "saved/data"
  cache_name: "fixed_random_split_v1.pkl"
  mask_ratio: 0.1
  load_aux_tables: false

# --------------------
# engine
# --------------------
engine:
  type: recbole

# --------------------
# model
# --------------------
model: EASE

recbole:
  dataset: rrs
  work_dir: "saved/recbole_runs/recbole_EASE_seqtopn"
  overrides:
    use_gpu: true
    gpu_id: 0
    # --------------------
    # train-only로 돌리고 싶으면 아래 `recbole.config.eval_args.split`을 켜면 됨:
    # (split [1,0,0]이면 RecBole 내부 valid/test 평가는 생략되고,
    #  제출용 full-sort TopK는 train 기반 eval loader로 안전하게 생성됨)
    #
    # (권장) overrides 대신 recbole.config로 결정:
    # config:
    #   eval_args:
    #     split:
    #       RS: [1.0, 0.0, 0.0]
    #     group_by: user
    #     order: RO
    #     mode:
    #       valid: full
    #       test: full

model_args:
  EASE:
    # RecBole EASE는 보통 정규화 파라미터(reg_weight/lambda 등)를 가짐.
    # 버전에 따라 키 이름이 다를 수 있으니, 실행 시 에러가 나면 recbole 로그에 맞춰 키를 조정하면 됨.
    reg_weight: 250.0


