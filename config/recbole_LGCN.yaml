# --------------------
# execution
# --------------------
predict: true
checkpoint: "saved/LightGCN-Dec-23-2025_05-17-08.pth"
seed: 42
device: cuda
verbose: true
run_name: "recbole_lgcn_seqtopn"

wandb: true
wandb_project:
memo: | 
# --------------------
# problem / data
# --------------------

train:
  run_dir: "saved/runs"
  submit_dir: "saved/submit"
  # train.* is the single source of truth (no recbole_train)
  seed: 42
  epochs: 5
  train_batch_size: 4096
  eval_batch_size: 4096
  learning_rate: 0.001
  topk: 10

problem:
  name: movies_seq_topn

data:
  # MoviesSeqTopNProblem이 cfg.data.pipeline 또는 cfg.problem.pipeline을 본다
  pipeline: seq_topn_ml_v1   # 너가 올린 파이프라인 이름 기준
  # pipeline이 내부에서 cfg.dataset.data_path를 요구하는 구조(ml_train_dir 로더)였음
dataset:
  data_path: "data/movielens/train"   # <- 여기만 실제 경로로 변경
  load_aux_tables: false            # tsv 무시 (원하면 true로 바꿔도 LightGCN엔 불필요)

# --------------------
# engine
# --------------------
engine:
  type: recbole              # 엔진 레지스트리 키가 "recbole"로 등록돼 있어야 함

# --------------------
# model
# --------------------
model: LightGCN

# RecBole 공통
recbole:
  dataset: rrs
  work_dir: "saved/recbole_runs/recbole_lgcn_seqtopn"  # <- 실행별로 폴더 구분 권장
  overrides:
    use_gpu: true
    gpu_id: 0

  # 필요하면 여기에 추가 override를 넣는다

### NOTE: recbole_train(legacy) removed. Use train.* only.

# 모델 하이퍼
model_args:
  LightGCN:
    embedding_size: 64
    n_layers: 3
    reg_weight: 1e-05
